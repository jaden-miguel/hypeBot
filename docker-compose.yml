services:
  # ---------------------------------------------------------------
  # Open WebUI
  # ---------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # ---------------------------------------------------------------
  # HypeBot — optimized for 24/7
  # ---------------------------------------------------------------
  hypebot:
    build: .
    container_name: hypebot
    env_file:
      - .env
    volumes:
      - hypebot-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - open-webui
    restart: always
    stop_grace_period: 10s
    mem_limit: 256m
    memswap_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  open-webui:
    external: true
  hypebot-data:
