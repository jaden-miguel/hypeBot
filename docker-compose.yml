version: "3.8"

services:
  # ---------------------------------------------------------------
  # Open WebUI (your existing setup — included here for one-command launch)
  # ---------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # ---------------------------------------------------------------
  # HypeBot — streetwear deals scraper + AI analyzer
  # ---------------------------------------------------------------
  hypebot:
    build: .
    container_name: hypebot
    env_file:
      - .env
    volumes:
      - hypebot-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - open-webui
    restart: always

volumes:
  open-webui:
    external: true
  hypebot-data:
