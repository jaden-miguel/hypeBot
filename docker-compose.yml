services:
  # ---------------------------------------------------------------
  # Open WebUI
  # ---------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # ---------------------------------------------------------------
  # HypeBot — lean 24/7 operation
  # ---------------------------------------------------------------
  hypebot:
    build: .
    container_name: hypebot
    env_file:
      - .env
    volumes:
      - hypebot-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - open-webui
    restart: unless-stopped
    stop_grace_period: 10s
    mem_limit: 384m
    memswap_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.path.exists(\"/app/data/deals.db\")' || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  open-webui:
    external: true
  hypebot-data:
